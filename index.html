<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gioco Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Login Gioco</h1>

    <input id="username" type="text" placeholder="Nome">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Accedi</button>

    <hr>

    <h2>Indovina il numero</h2>
    <input id="guess" type="number" placeholder="Inserisci numero">
    <button onclick="sendGuess()">Invia</button>

    <div id="log"></div>

    <script src="client.js"></script>
</body>
</html>
